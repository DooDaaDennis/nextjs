name: Deploy

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push image
        run: |
          docker build -t ghcr.io/doodaadennis/nextjs:latest .
          docker push ghcr.io/doodaadennis/nextjs:latest

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        run: gh release create ${{ github.ref_name }} --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Copy files to server
        run: scp docker-compose.yml dennis@${{ secrets.SERVER_HOST }}:/home/dennis/web/dennisapplebaum/nextjs/

      - name: Deploy on server
        run: |
          ssh dennis@${{ secrets.SERVER_HOST }} bash <<'EOF'
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u DooDaaDennis --password-stdin
            cd /home/dennis/web/dennisapplebaum/nextjs
            docker compose pull
            docker compose up -d
            docker image prune -f
          EOF
